name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raffle
          POSTGRES_PASSWORD: raffle_secret
          POSTGRES_DB: raffle_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Setup API env
        run: |
          cp apps/api/.env.example apps/api/.env
          echo "DATABASE_URL=postgresql://raffle:raffle_secret@localhost:5432/raffle_db?schema=public" >> apps/api/.env

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: cd apps/api && npx prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Run API tests
        run: pnpm --filter @raffle/api test

      - name: Build API
        run: pnpm --filter @raffle/api build

      - name: Build Web
        run: pnpm --filter @raffle/web build
        env:
          API_URL: http://localhost:3001
