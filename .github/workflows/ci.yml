name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Setup API env
        run: cp apps/api/.env.example apps/api/.env

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run API tests
        run: pnpm --filter @raffle/api test

      - name: Build API
        run: pnpm --filter @raffle/api build

      - name: Build Web
        run: pnpm --filter @raffle/web build
        env:
          API_URL: http://localhost:3001
