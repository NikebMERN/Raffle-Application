name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: raffle
          MONGO_INITDB_ROOT_PASSWORD: raffle_secret
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Setup API env
        run: |
          cp apps/api/.env.example apps/api/.env
          echo 'MONGODB_URI="mongodb://raffle:raffle_secret@localhost:27017/raffle_db?authSource=admin"' >> apps/api/.env

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push MongoDB schema
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Run API tests
        run: pnpm --filter @raffle/api test

      - name: Build API
        run: pnpm --filter @raffle/api build

      - name: Build Web
        run: pnpm --filter @raffle/web build
        env:
          API_URL: http://localhost:3001
