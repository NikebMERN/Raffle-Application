name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: raffle
          MONGO_INITDB_ROOT_PASSWORD: raffle_secret
        ports:
          - 27017:27017
        options: >-
          --replSet rs0
          --health-cmd "mongosh -u raffle -p raffle_secret --authenticationDatabase admin --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Initialize MongoDB replica set
        run: |
          for i in $(seq 1 30); do
            if docker run --rm --network host mongo:7 mongosh "mongodb://raffle:raffle_secret@127.0.0.1:27017/admin?authSource=admin" --quiet --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }" 2>/dev/null | grep -q 1; then
              echo "Replica set ready"
              exit 0
            fi
            sleep 2
          done
          echo "Replica set failed to initialize"
          exit 1

      - name: Setup API env
        run: |
          cp apps/api/.env.example apps/api/.env
          echo 'MONGODB_URI="mongodb://raffle:raffle_secret@localhost:27017/raffle_db?authSource=admin&replicaSet=rs0"' >> apps/api/.env

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push MongoDB schema
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Run API tests
        run: pnpm --filter @raffle/api test

      - name: Build API
        run: pnpm --filter @raffle/api build

      - name: Build Web
        run: pnpm --filter @raffle/web build
        env:
          API_URL: http://localhost:3001
