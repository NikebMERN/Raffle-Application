apiVersion: apps/v1
kind: Deployment
metadata:
  name: sf-raffle-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sf-raffle-backend
  template:
    metadata:
      labels:
        app: sf-raffle-backend
    spec:
      containers:
        - name: backend
          image: sf-raffle-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: sf-raffle-config
            # Create with: kubectl create secret generic sf-raffle-secrets \
            #   --from-literal=FIREBASE_PROJECT_ID=... \
            #   --from-literal=FIREBASE_CLIENT_EMAIL=... \
            #   --from-literal=FIREBASE_PRIVATE_KEY=... \
            #   --from-literal=ADMIN_EMAILS=... \
            #   --from-literal=STRIPE_SECRET_KEY=... --from-literal=STRIPE_WEBHOOK_SECRET=...
            - secretRef:
                name: sf-raffle-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
